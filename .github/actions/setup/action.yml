name: Setup
description: Checkout, install moon, pnpm, Node.js, and dependencies

runs:
  using: composite
  steps:
    - name: Cache moon setup
      uses: actions/cache@v5
      with:
        path: .moon
        key: ${{ runner.os }}-moon-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-moon-
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: "pnpm"
    - name: Setup Moonrepo
      uses: moonrepo/setup-toolchain@v0
      with:
        auto-install: true
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
