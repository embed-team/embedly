name: Validate

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, devel]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Lint and format check
        run: pnpm biome ci
      - name: Build all packages
        run: pnpm build

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run tests
        run: pnpm test
