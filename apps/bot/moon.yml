layer: "application"
language: "typescript"

project:
  title: "@embedly/bot"
  description: "Discord bot for Embedly"

tasks:
  dev:
    script: |
      set -e

      trap 'docker compose stop cache' EXIT
      docker compose up --detach cache
      pnpm dev
    options:
      envFile: true
    deps:
      - api:dev
  docker:
    command: docker compose
    options:
      envFile: true
      cache: false
  docker/stop:
    command: docker compose down
    options:
      cache: false
  docker/start:
    command: docker compose up -d
    options:
      envFile: true
      cache: false
  docker/restart:
    command: docker compose up -d --build --force-recreate --no-deps bot
    options:
      envFile: true
      cache: false
  docker/build:
    command: docker compose build
    options:
      envFile: true
      cache: false
  build:
    command: tsdown
  start:
    command: node dist/main.mjs
    options:
      envFile: true
