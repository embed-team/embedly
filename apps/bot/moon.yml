layer: "application"
language: "typescript"

project:
  title: "@embedly/bot"
  description: "Discord bot for Embedly"

tasks:
  dev:
    command: docker compose up --build
    options:
      interactive: true
    deps:
      - api:dev
  build:
    command: tsdown
  start:
    command: node dist/main.mjs
    options:
      envFile: true
