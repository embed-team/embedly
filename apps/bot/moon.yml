layer: "application"
language: "typescript"

project:
  title: "@embedly/bot"
  description: "Discord bot for Embedly"

tasks:
  dev:
    script: |
      set -e

      trap 'docker compose stop cache' EXIT
      docker compose up --detach cache
      pnpm dev
    options:
      envFile: true
    deps:
      - api:dev
  docker/stop:
    command: docker compose down
  docker/start:
    command: docker compose up -d
    options:
      envFile: true
  docker/build:
    command: docker compose up --build -d
    options:
      envFile: true
  build:
    command: tsdown
  start:
    command: node dist/main.mjs
    options:
      envFile: true
