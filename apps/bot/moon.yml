layer: "application"
language: "typescript"

project:
  title: "@embedly/bot"
  description: "Discord bot for Embedly"

tasks:
  dev:
    script: |
      set -e

      trap 'docker compose stop cache' EXIT
      docker compose up --detach cache
      pnpm dev
    options:
      envFile: true
    deps:
      - api:dev
  build:
    command: tsdown
  start:
    command: node dist/main.mjs
    options:
      envFile: true
