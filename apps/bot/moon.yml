layer: "application"
language: "typescript"

project:
  title: "@embedly/bot"
  description: "Discord bot for Embedly"

tasks:
  dev:
    command: tsx watch src/main.ts
    options:
      envFile: true
  build:
    command: tsdown
  start:
    command: node dist/main.mjs
    options:
      envFile: true
